name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  tests:
    name: Test Suite
    uses: ./.github/workflows/tests.yml

  build:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: tests
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image base (lowercase for Docker)
        run: echo "IMAGE_BASE=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive frontend build arg
        run: |
          printf '%s' "${{ secrets.DEPLOY_ENV }}" > .env.production
          VITE_API_URL="$(grep '^VITE_API_URL=' .env.production | cut -d= -f2- | tail -n1)"
          if [ -z "$VITE_API_URL" ]; then
            VITE_API_URL="https://api.example.com"
          fi
          echo "VITE_API_URL=$VITE_API_URL" >> "$GITHUB_ENV"

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.light
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/worker:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

      - name: Build and push beat image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.light
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/beat:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/beat:latest
          cache-from: type=gha,scope=beat
          cache-to: type=gha,scope=beat,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          build-args: |
            VITE_API_URL=${{ env.VITE_API_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image base (lowercase for Docker)
        run: echo "IMAGE_BASE=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set deploy SSH parameters
        run: |
          set -eu
          SSH_PORT="${{ secrets.DEPLOY_PORT }}"
          if [ -z "$SSH_PORT" ]; then
            SSH_PORT=22
          fi
          case "$SSH_PORT" in
            ''|*[!0-9]*)
              echo "DEPLOY_PORT must be numeric when configured"
              exit 1
              ;;
          esac
          echo "SSH_PORT=$SSH_PORT" >> "$GITHUB_ENV"
          echo 'SSH_KNOWN_HOSTS_FILE=$HOME/.ssh/known_hosts' >> "$GITHUB_ENV"
          echo 'SSH_COMMON_OPTS=-o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o ServerAliveInterval=15 -o ServerAliveCountMax=3' >> "$GITHUB_ENV"

      - name: Setup SSH key
        run: |
          set -eu
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "DEPLOY_HOST is empty or not configured"
            exit 1
          fi
          case "${{ secrets.DEPLOY_HOST }}" in
            *://*|*@*|*/*)
              echo "DEPLOY_HOST must be a bare hostname or IP address"
              exit 1
              ;;
          esac
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "DEPLOY_SSH_KEY is empty or not configured"
            exit 1
          fi
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          if [ ! -s ~/.ssh/id_ed25519 ]; then
            echo "DEPLOY_SSH_KEY did not write to ~/.ssh/id_ed25519"
            exit 1
          fi
          chmod 600 ~/.ssh/id_ed25519
          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null 2>&1; then
            echo "DEPLOY_SSH_KEY is not a valid private key"
            exit 1
          fi
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          echo "Preparing SSH access for host: ${{ secrets.DEPLOY_HOST }} on port $SSH_PORT"
          if [ -n "${{ secrets.DEPLOY_KNOWN_HOSTS }}" ]; then
            printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" | tr -d '\r' > ~/.ssh/known_hosts
          else
            if ! ssh-keyscan -T 10 -p "$SSH_PORT" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/tmp/ssh-keyscan.err; then
              echo "ssh-keyscan failed for DEPLOY_HOST=${{ secrets.DEPLOY_HOST }} on port $SSH_PORT"
              cat /tmp/ssh-keyscan.err
              exit 1
            fi
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Create docker-compose.ci.yml for prebuilt images
        run: |
          IMAGE_TAG="${{ github.sha }}"
          IMAGE_BASE="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}"
          printf 'services:\n  api:\n    image: %s/api:%s\n  worker:\n    image: %s/worker:%s\n  beat:\n    image: %s/beat:%s\n  frontend:\n    image: %s/frontend:%s\n' \
            "$IMAGE_BASE" "$IMAGE_TAG" "$IMAGE_BASE" "$IMAGE_TAG" "$IMAGE_BASE" "$IMAGE_TAG" "$IMAGE_BASE" "$IMAGE_TAG" > docker-compose.ci.yml

      - name: Sync deployment assets to server
        run: |
          ssh ${{ env.SSH_COMMON_OPTS }} -p "${{ env.SSH_PORT }}" -i ~/.ssh/id_ed25519 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "mkdir -p '${{ secrets.DEPLOY_PATH }}'"
          rsync -avz --delete \
            --exclude ".venv" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            --exclude ".mypy_cache" \
            --exclude "tests" \
            --exclude "test.sqlite3" \
            --exclude "models" \
            -e "ssh ${{ env.SSH_COMMON_OPTS }} -p ${{ env.SSH_PORT }} -i ~/.ssh/id_ed25519" \
            ./deploy \
            ./backend \
            ./docker-compose.yml \
            ./docker-compose.prod.yml \
            ./docker-compose.ci.yml \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Upload production env file
        run: |
          printf '%s' "${{ secrets.DEPLOY_ENV }}" > .env.production
          scp ${{ env.SSH_COMMON_OPTS }} -P "${{ env.SSH_PORT }}" -i ~/.ssh/id_ed25519 .env.production "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/.env.production"

      - name: Log in to GHCR on server
        env:
          GHCR_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_PAT" | ssh ${{ env.SSH_COMMON_OPTS }} -p "${{ env.SSH_PORT }}" -i ~/.ssh/id_ed25519 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin"

      - name: Deploy containers
        run: |
          ssh ${{ env.SSH_COMMON_OPTS }} -p "${{ env.SSH_PORT }}" -i ~/.ssh/id_ed25519 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "cd '${{ secrets.DEPLOY_PATH }}' && chmod +x deploy/deploy.sh && ./deploy/deploy.sh .env.production"

      - name: Health check
        run: |
          ssh ${{ env.SSH_COMMON_OPTS }} -p "${{ env.SSH_PORT }}" -i ~/.ssh/id_ed25519 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" '
            APP_DOMAIN="$(grep "^APP_DOMAIN=" "${{ secrets.DEPLOY_PATH }}/.env.production" | cut -d= -f2- | tr -d "\r" | tail -n1)"
            if [ -z "$APP_DOMAIN" ]; then
              echo "APP_DOMAIN is missing in .env.production"
              exit 1
            fi
            for i in $(seq 1 30); do
              curl -fsS --resolve "${APP_DOMAIN}:443:127.0.0.1" "https://${APP_DOMAIN}/health" && exit 0
              sleep 5
            done
            echo "Health check failed after 150s"
            exit 1
          '
